name: Bolashak 2026 monitor

on:
  schedule:
    # Every 3 hours (UTC). GitHub runs scheduled jobs on a best-effort basis.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

# Allow the job to commit the updated state file back to the repo.
permissions:
  contents: write

# Never run two checks at the same time.
concurrency:
  group: bolashak-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_YEAR: "2026"
          # The name to search for in each new PDF. Edit these to change it.
          WATCH_SURNAME: "Аманбай"
          WATCH_FIRSTNAME: "Алмас"
        run: python monitor.py

      - name: Persist state
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update monitor state [skip ci]"
            git push
          else
            echo "No state change to persist."
          fi
